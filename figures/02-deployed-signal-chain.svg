<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1140 600" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#e6821e"/>
    </marker>
    <style>
      .card   { fill:#f4f7fa; stroke:#dbe3ec; stroke-width:1; }
      .panel  { fill:#14385f; }
      .ptitle { fill:#ffffff; font-size:18px; font-weight:bold; letter-spacing:1px; }
      .box    { fill:#ffffff; stroke:#c9d6e3; stroke-width:1.5; rx:8; }
      .boxA   { fill:#fff6ec; stroke:#e6b07a; stroke-width:1.5; rx:8; }
      .bt     { fill:#14385f; font-size:15px; font-weight:bold; text-anchor:middle; }
      .bs     { fill:#5b6b7d; font-size:11.5px; text-anchor:middle; }
      .note   { fill:#e6821e; font-size:13px; font-weight:bold; text-anchor:middle; }
      .sub    { fill:#33475b; font-size:12.5px; text-anchor:middle; }
      .iso    { stroke:#e6821e; stroke-width:2; stroke-dasharray:6 5; }
      .isolbl { fill:#e6821e; font-size:11px; font-weight:bold; text-anchor:middle; }
    </style>
  </defs>

  <!-- ===== SIGNAL CHAIN PANEL ===== -->
  <rect x="20" y="20" width="1100" height="250" rx="10" class="card"/>
  <rect x="20" y="20" width="1100" height="40" rx="10" class="panel"/>
  <rect x="20" y="40" width="1100" height="20" class="panel"/>
  <text x="44" y="47" class="ptitle">DEPLOYED SIGNAL CHAIN</text>

  <!-- boxes: 6 stages, width 160, gap 24, start x=40, y=100, h=92 -->
  <!-- 1 sensor -->
  <rect x="40"  y="100" width="160" height="92" class="box"/>
  <text x="120" y="135" class="bt">UAE sensor</text>
  <text x="120" y="155" class="bs">+ preamp</text>
  <text x="120" y="173" class="bs">balanced output</text>
  <!-- 2 AFE -->
  <rect x="224" y="100" width="160" height="92" class="boxA"/>
  <text x="304" y="130" class="bt">ADA4945-1 FDA</text>
  <text x="304" y="149" class="bs">AFE · on eval board</text>
  <text x="304" y="167" class="bs">~48–55 kHz rolloff</text>
  <!-- 3 ADC -->
  <rect x="408" y="100" width="160" height="92" class="box"/>
  <text x="488" y="130" class="bt">AD4630-24</text>
  <text x="488" y="149" class="bs">24-bit SAR ADC</text>
  <text x="488" y="167" class="bs">500 kSPS · dual ch.</text>
  <!-- 4 ZedBoard -->
  <rect x="592" y="100" width="160" height="92" class="box"/>
  <text x="672" y="130" class="bt">ZedBoard</text>
  <text x="672" y="149" class="bs">Zynq-7020</text>
  <text x="672" y="167" class="bs">Linux + IIO, local capture</text>
  <!-- 5 Ethernet -->
  <rect x="776" y="100" width="160" height="92" class="box"/>
  <text x="856" y="130" class="bt">Gigabit Ethernet</text>
  <text x="856" y="149" class="bs">galvanic isolation</text>
  <text x="856" y="167" class="bs">IIO over Ethernet</text>
  <!-- 6 Host -->
  <rect x="960" y="100" width="160" height="92" class="box"/>
  <text x="1040" y="130" class="bt">Host PC</text>
  <text x="1040" y="149" class="bs">Python (capture)</text>
  <text x="1040" y="167" class="bs">MATLAB (analysis)</text>

  <!-- arrows -->
  <line x1="200" y1="146" x2="222" y2="146" class="iso" stroke="#e6821e" stroke-dasharray="0" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="384" y1="146" x2="406" y2="146" stroke="#e6821e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="568" y1="146" x2="590" y2="146" stroke="#e6821e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="752" y1="146" x2="774" y2="146" stroke="#e6821e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="936" y1="146" x2="958" y2="146" stroke="#e6821e" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- AA note -->
  <text x="570" y="230" class="note">No external anti-alias filter</text>
  <text x="570" y="250" class="sub">the AFE's own ~48–55 kHz rolloff already band-limits well below the 250 kHz Nyquist</text>

  <!-- ===== POWER PANEL ===== -->
  <rect x="20" y="300" width="1100" height="280" rx="10" class="card"/>
  <rect x="20" y="300" width="1100" height="40" rx="10" class="panel"/>
  <rect x="20" y="320" width="1100" height="20" class="panel"/>
  <text x="44" y="327" class="ptitle">POWER — TWO GALVANICALLY ISOLATED RAILS</text>

  <!-- digital domain (left) -->
  <text x="300" y="372" class="sub" font-weight="bold" fill="#14385f">DIGITAL DOMAIN — loud, switching</text>
  <rect x="120" y="392" width="360" height="56" class="box"/>
  <text x="300" y="416" class="bt">12 V LiFePO4 battery</text>
  <text x="300" y="435" class="bs">→ ZedBoard J20 (Zynq, Eth PHY, on-board DC-DCs)</text>

  <!-- analog domain (right) -->
  <text x="840" y="372" class="sub" font-weight="bold" fill="#e6821e">ANALOG DOMAIN — quiet, sub-µV floor</text>
  <rect x="660" y="392" width="360" height="56" class="boxA"/>
  <text x="840" y="411" class="bt">12 V (separate) → LT3045 LDO → 5 V</text>
  <text x="840" y="430" class="bs">0.8 µVrms · &gt;75 dB PSRR  →  preamp + UAE sensor</text>

  <!-- isolation barrier -->
  <line x1="570" y1="360" x2="570" y2="486" class="iso"/>
  <line x1="570" y1="524" x2="570" y2="540" class="iso"/>
  <text x="570" y="500" class="isolbl">galvanic</text>
  <text x="570" y="514" class="isolbl">isolation</text>

  <!-- why note -->
  <text x="570" y="560" class="sub">24-bit floor sits at the µV level — a shared ground turns digital switching into measured analog noise</text>
</svg>
