<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1334 750" font-family="'DejaVu Sans', Arial, sans-serif">
  <defs>
    <marker id="arrPow" markerWidth="10" markerHeight="10" refX="7.5" refY="3.5" orient="auto">
      <path d="M0,0 L8,3.5 L0,7 Z" fill="#444"/>
    </marker>
    <marker id="arrSig" markerWidth="10" markerHeight="10" refX="7.5" refY="3.5" orient="auto">
      <path d="M0,0 L8,3.5 L0,7 Z" fill="#0e7c7b"/>
    </marker>
    <marker id="arrNetA" markerWidth="10" markerHeight="10" refX="7.5" refY="3.5" orient="auto">
      <path d="M0,0 L8,3.5 L0,7 Z" fill="#333"/>
    </marker>
    <marker id="arrNetB" markerWidth="10" markerHeight="10" refX="2.5" refY="3.5" orient="auto">
      <path d="M8,0 L0,3.5 L8,7 Z" fill="#333"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1334" height="750" fill="#ffffff"/>

  <!-- Title -->
  <text x="40" y="48" font-size="29" font-weight="700" fill="#1f3a5f">Power architecture</text>
  <text x="40" y="76" font-size="16" fill="#555">Separate sensor supply · evaluation board powered over FMC · galvanic isolation only at the Ethernet interface</text>

  <!-- ============ Sensor + preamplifier domain (top) ============ -->
  <rect x="300" y="110" width="470" height="155" rx="12" fill="#f6f1e8" stroke="#9a7b4f" stroke-width="2"/>
  <text x="316" y="134" font-size="16" font-weight="700" fill="#6b4f2a">Sensor + preamplifier domain</text>

  <rect x="315" y="150" width="120" height="100" rx="6" fill="#ffffff" stroke="#9a7b4f" stroke-width="1.5"/>
  <text x="375" y="194" font-size="14.5" font-weight="600" fill="#1a1a1a" text-anchor="middle">Isolated</text>
  <text x="375" y="214" font-size="14.5" font-weight="600" fill="#1a1a1a" text-anchor="middle">5 V source</text>

  <rect x="455" y="150" width="140" height="100" rx="6" fill="#ffffff" stroke="#9a7b4f" stroke-width="1.5"/>
  <text x="525" y="186" font-size="14.5" font-weight="700" fill="#1a1a1a" text-anchor="middle">LT3045 LDO</text>
  <text x="525" y="208" font-size="12.5" fill="#555" text-anchor="middle">0.8 µVrms noise</text>
  <text x="525" y="226" font-size="12.5" fill="#555" text-anchor="middle">high PSRR</text>

  <rect x="615" y="150" width="140" height="100" rx="6" fill="#ffffff" stroke="#9a7b4f" stroke-width="1.5"/>
  <text x="685" y="194" font-size="14.5" font-weight="600" fill="#1a1a1a" text-anchor="middle">Preamp +</text>
  <text x="685" y="214" font-size="14.5" font-weight="600" fill="#1a1a1a" text-anchor="middle">UAE sensor</text>

  <line x1="435" y1="200" x2="453" y2="200" stroke="#444" stroke-width="2.5" marker-end="url(#arrPow)"/>
  <line x1="595" y1="200" x2="613" y2="200" stroke="#444" stroke-width="2.5" marker-end="url(#arrPow)"/>

  <!-- ============ ZedBoard + evaluation-board domain (main) ============ -->
  <rect x="300" y="320" width="560" height="360" rx="14" fill="#eef3f8" stroke="#1f3a5f" stroke-width="2.5"/>
  <text x="316" y="346" font-size="17" font-weight="700" fill="#1f3a5f">ZedBoard + evaluation-board domain</text>
  <text x="316" y="368" font-size="13.5" font-style="italic" fill="#555">single ground plane — one electrical domain</text>

  <!-- ZedBoard block -->
  <rect x="325" y="392" width="235" height="232" rx="8" fill="#ffffff" stroke="#1f3a5f" stroke-width="1.8"/>
  <text x="442" y="420" font-size="15.5" font-weight="700" fill="#1f3a5f" text-anchor="middle">ZedBoard (Zynq-7000)</text>
  <line x1="345" y1="432" x2="540" y2="432" stroke="#cfd9e6" stroke-width="1.2"/>
  <text x="345" y="458" font-size="13.5" fill="#1a1a1a">J20: 12 V input (barrel jack)</text>
  <text x="345" y="484" font-size="13.5" fill="#1a1a1a">Maxim switching regulators</text>
  <text x="345" y="510" font-size="13.5" fill="#1a1a1a">Zynq PS/PL + 512 MB DDR3</text>
  <text x="345" y="536" font-size="13.5" fill="#1a1a1a">Gbit Ethernet PHY</text>
  <text x="345" y="562" font-size="13.5" fill="#1a1a1a">SD-card boot, FPGA capture</text>
  <text x="345" y="595" font-size="13.5" font-weight="600" fill="#1f3a5f">12 V out → FMC</text>

  <!-- Eval board block -->
  <rect x="600" y="392" width="235" height="232" rx="8" fill="#ffffff" stroke="#1f3a5f" stroke-width="1.8"/>
  <text x="717" y="420" font-size="15.5" font-weight="700" fill="#1f3a5f" text-anchor="middle">AD4630-24 eval board</text>
  <line x1="620" y1="432" x2="815" y2="432" stroke="#cfd9e6" stroke-width="1.2"/>
  <text x="620" y="458" font-size="13.5" font-weight="600" fill="#1f3a5f">12 V in via FMC</text>
  <text x="620" y="484" font-size="13.5" fill="#1a1a1a">ADA4945-1 FDA front end</text>
  <text x="620" y="510" font-size="13.5" fill="#1a1a1a">24-bit dual-channel ADC</text>
  <text x="620" y="540" font-size="13.5" fill="#1a1a1a">on-board regulators →</text>
  <text x="638" y="562" font-size="13.5" fill="#555">VAMP±, +5 V, +1.8 V, VIO</text>
  <text x="620" y="595" font-size="13" font-style="italic" fill="#555">all rails derived from FMC 12 V</text>

  <!-- FMC 12 V arrow ZedBoard -> eval -->
  <line x1="560" y1="472" x2="598" y2="472" stroke="#444" stroke-width="3" marker-end="url(#arrPow)"/>
  <text x="579" y="462" font-size="12.5" font-weight="600" fill="#444" text-anchor="middle">FMC</text>

  <!-- domain bottom caption -->
  <text x="316" y="662" font-size="12.5" fill="#555">No isolation between ZedBoard and eval board — they share ground through the FMC connector.</text>

  <!-- ============ Battery (left) ============ -->
  <rect x="60" y="452" width="170" height="92" rx="10" fill="#ffffff" stroke="#2e7d32" stroke-width="2.2"/>
  <text x="145" y="490" font-size="16" font-weight="700" fill="#2e7d32" text-anchor="middle">12 V LiFePO₄</text>
  <text x="145" y="514" font-size="13.5" fill="#1a1a1a" text-anchor="middle">battery pack</text>
  <line x1="230" y1="498" x2="323" y2="498" stroke="#444" stroke-width="3" marker-end="url(#arrPow)"/>
  <text x="276" y="488" font-size="13" font-weight="600" fill="#444" text-anchor="middle">12 V</text>

  <!-- ============ Analog signal: sensor -> eval input ============ -->
  <line x1="685" y1="250" x2="685" y2="390" stroke="#0e7c7b" stroke-width="2.8" marker-end="url(#arrSig)"/>
  <text x="700" y="296" font-size="13" font-weight="600" fill="#0e7c7b">UAE analog signal</text>
  <text x="700" y="314" font-size="12.5" fill="#0e7c7b">(BNC → SMA, to ADC input)</text>

  <!-- ============ Isolation boundary + host (right) ============ -->
  <text x="965" y="350" font-size="14.5" font-weight="700" fill="#c0392b" text-anchor="middle">Galvanic isolation</text>
  <text x="965" y="370" font-size="12.5" fill="#c0392b" text-anchor="middle">Ethernet RJ-45 magnetics</text>
  <text x="965" y="388" font-size="12.5" fill="#c0392b" text-anchor="middle">1500–2500 Vrms</text>
  <line x1="965" y1="400" x2="965" y2="600" stroke="#c0392b" stroke-width="2.4" stroke-dasharray="9 7"/>

  <!-- Host laptop -->
  <rect x="1060" y="452" width="200" height="92" rx="10" fill="#ffffff" stroke="#333" stroke-width="2"/>
  <text x="1160" y="490" font-size="16" font-weight="700" fill="#1a1a1a" text-anchor="middle">Host laptop</text>
  <text x="1160" y="514" font-size="13.5" fill="#555" text-anchor="middle">capture + analysis</text>

  <!-- Ethernet link across barrier -->
  <line x1="862" y1="498" x2="1058" y2="498" stroke="#333" stroke-width="2.6" marker-start="url(#arrNetB)" marker-end="url(#arrNetA)"/>
  <text x="1018" y="486" font-size="12.5" font-weight="600" fill="#333" text-anchor="middle">Ethernet</text>

  <!-- ============ Legend ============ -->
  <line x1="60" y1="698" x2="92" y2="698" stroke="#444" stroke-width="3" marker-end="url(#arrPow)"/>
  <text x="100" y="703" font-size="13" fill="#1a1a1a">power (12 V)</text>
  <line x1="230" y1="698" x2="262" y2="698" stroke="#0e7c7b" stroke-width="3" marker-end="url(#arrSig)"/>
  <text x="270" y="703" font-size="13" fill="#1a1a1a">analog signal</text>
  <line x1="400" y1="698" x2="438" y2="698" stroke="#c0392b" stroke-width="2.6" stroke-dasharray="9 7"/>
  <text x="446" y="703" font-size="13" fill="#1a1a1a">galvanic isolation boundary</text>

  <!-- Footnote -->
  <text x="60" y="732" font-size="12.5" fill="#555">The LT3045 keeps ZedBoard switching noise off the sensor electronics; it is a low-noise regulator, not a galvanic isolator. The only galvanic isolation in the system is the Ethernet interface.</text>
</svg>
